[package]
name = "graphql-orm"
version = "0.2.0"
edition.workspace = true
description = "Runtime support crate for graphql-orm-macros"
license.workspace = true
repository.workspace = true

[features]
default = ["sqlite"]
sqlite = ["graphql-orm-macros/sqlite"]
postgres = ["graphql-orm-macros/postgres"]

[dependencies]
async-graphql.workspace = true
futures.workspace = true
graphql-orm-macros = { path = "../graphql-orm-macros", version = "0.3.1", default-features = false }
serde.workspace = true
serde_json.workspace = true
sqlx.workspace = true
tokio = { workspace = true, features = ["sync"] }
tokio-stream.workspace = true
uuid.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync"] }
